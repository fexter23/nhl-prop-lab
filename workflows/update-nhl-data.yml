name: Update NHL Daily Stats

on:
  schedule:
    # Runs every day at 13:00 UTC (that's 9:00 EDT / 8:00 EST in winter)
    # Adjust the hour according to when you want it (see notes below)
    - cron: '0 13 * * *'

  # Allows you to manually trigger it from the Actions tab
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'          # or 3.12 — whatever nhlpy supports best

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily NHL data generator
        run: python full_setup.py

      # Very important if you want the json files visible/updated in the repo
      - name: Commit and push updated JSON files
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          
          git add daily_*.json today_context.json
          git diff --staged --quiet || git commit -m "Update daily NHL stats [$(date +'%Y-%m-%d')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
