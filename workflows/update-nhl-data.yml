name: Update NHL Daily Stats

on:
  schedule:
    - cron: '0 13 * * *'   # 9 AM EDT / 8 AM EST — adjust if needed
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily NHL data generator
        run: python full_setup.py

      - name: Commit and push updated JSON files (only if changed)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          
          git add daily_*.json today_context.json no_games_today.flag 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "Update daily NHL stats & trends [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "No changes detected — nothing to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
