name: Generate Hit Rate Matrix
on:
  schedule:
    - cron: '0 4 * * *' # Runs at 4:00 AM UTC daily
  workflow_dispatch:     # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas nhlpy pyarrow
      - name: Run generation script
        run: python scripts/generate_matrix.py
      - name: Commit and push file
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/hit_rate_matrix.parquet
          git commit -m "Update hit rate matrix [skip ci]"
          git push
