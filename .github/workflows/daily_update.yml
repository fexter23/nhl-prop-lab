name: Daily NHL Trends Update

on:
  schedule:
    - cron: '0 13 * * *' 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: List files (DEBUG)
        run: ls -R  # This will show you exactly where your files are in the runner logs

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas nhlpy

      - name: Run calculation
        # If 'ls -R' shows the file is in a folder, change the path here
        run: python scripts/daily_trends.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_trends.json
          git commit -m "Update daily trends $(date)" || exit 0
          git push
