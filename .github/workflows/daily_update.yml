name: Daily NHL Trends Update

on:
  schedule:
    - cron: '0 13 * * *' # 8:00 AM EST (13:00 UTC)
  workflow_dispatch:

# Opt into Node.js 24 runtime immediately as recommended
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated from v3 to v6 (Supports Node 24)

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated from v4 to v6 (Supports Node 24)
        with:
          python-version: '3.9'
          cache: 'pip' # Optional: enables caching for faster runs

      - name: Install dependencies
        run: |
          pip install pandas nhlpy

      - name: Run calculation
        run: python daily_trends.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_trends.json
          git commit -m "Update daily trends $(date)" || exit 0
          git push
