name: Update NHL Daily Stats

on:
  schedule:
    - cron: '0 6 * * *'          # ≈ 9:00 AM EDT (summer) / 8:00 AM EST (winter) Quebec time

  workflow_dispatch:              # lets you run it manually from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'    # or '3.12' — nhlpy works fine on both

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run daily NHL data generator
        run: python full_setup.py

      - name: Commit and push updated files (only if changed)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          
          # Stage the files we generate
          git add daily_*.json today_context.json 2>/dev/null || true
          
          # Only commit & push if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "Daily NHL stats & trends update [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "No changes — skipping commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
